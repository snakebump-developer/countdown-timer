<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0ff"/>
            <stop offset="100%" stop-color="#f0f"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
    <!-- Background a pieno fill (maskable: safe area è il 80% centrale) -->
    <rect width="512" height="512" fill="#050810"/>
    <!-- Outer ring (ridotto per safe area maskable) -->
    <circle cx="256" cy="256" r="175" fill="none" stroke="url(#ring)" stroke-width="16" stroke-linecap="round"
        stroke-dasharray="1100" stroke-dashoffset="275" filter="url(#glow)"
        transform="rotate(-90 256 256)"/>
    <circle cx="256" cy="256" r="175" fill="none" stroke="rgba(0,255,255,0.12)" stroke-width="16"/>
    <!-- Clock center dot -->
    <circle cx="256" cy="256" r="12" fill="#0ff" filter="url(#glow)"/>
    <!-- Clock hands -->
    <line x1="256" y1="256" x2="256" y2="160" stroke="#0ff" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="256" y1="256" x2="315" y2="256" stroke="#f0f" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
</svg>
