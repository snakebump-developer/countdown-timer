<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
    <defs>
        <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0ff"/>
            <stop offset="100%" stop-color="#f0f"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
    <!-- Background -->
    <rect width="192" height="192" rx="40" fill="#050810"/>
    <!-- Outer ring -->
    <circle cx="96" cy="96" r="78" fill="none" stroke="url(#ring)" stroke-width="7" stroke-linecap="round"
        stroke-dasharray="490" stroke-dashoffset="122" filter="url(#glow)"
        transform="rotate(-90 96 96)"/>
    <!-- Inner dim track -->
    <circle cx="96" cy="96" r="78" fill="none" stroke="rgba(0,255,255,0.12)" stroke-width="7"/>
    <!-- Clock center dot -->
    <circle cx="96" cy="96" r="5" fill="#0ff" filter="url(#glow)"/>
    <!-- Clock hands -->
    <line x1="96" y1="96" x2="96" y2="54" stroke="#0ff" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="96" y1="96" x2="122" y2="96" stroke="#f0f" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
</svg>
