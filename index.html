<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Futuristic Timer</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050810">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Timer">
    <link rel="apple-touch-icon" href="icon-512.svg">
    <meta name="description" content="Timer futuristico con modalità Pomodoro Challenge">

    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏳</text></svg>">
</head>

<body>
    <div class="app">

        <!-- ── Auth bar ── -->
        <div class="auth-bar">
            <button class="auth-bar__btn" id="auth-open-btn" aria-label="Accedi o registrati">
                <i class="fa-solid fa-user-astronaut"></i>
                <span>ACCEDI</span>
            </button>
            <div class="auth-bar__user" id="auth-user" hidden>
                <div class="auth-bar__pomodoros" title="Pomodori totali ottenuti con la Pomodoro Challenge">
                    <svg class="auth-bar__pom-svg" viewBox="0 0 20 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <line x1="10" y1="5.5" x2="10" y2="2" stroke="#00ffaa" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M10 4.5C9.2 2.8 7 2 7 4.2C8 3.2 10 4.5 10 4.5Z" fill="#00ffaa"/>
                        <path d="M10 4.5C10.8 2.8 13 2 13 4.2C12 3.2 10 4.5 10 4.5Z" fill="#00ffaa"/>
                        <circle cx="10" cy="13.5" r="7.5" stroke="#ff4080" stroke-width="1.2"/>
                        <circle cx="10" cy="13.5" r="4.5" stroke="rgba(255,80,150,0.35)" stroke-width="0.8" fill="rgba(255,40,100,0.1)"/>
                        <ellipse cx="7.5" cy="10.5" rx="1.5" ry="1" fill="rgba(255,255,255,0.4)" transform="rotate(-15 7.5 10.5)"/>
                    </svg>
                    <span class="auth-bar__pom-count" id="auth-total-count">0</span>
                    <span class="auth-bar__pom-label">POM. TOTALI</span>
                </div>
                <span class="auth-bar__email" id="auth-email"></span>
                <button class="auth-bar__logout" id="auth-logout-btn" aria-label="Esci dall'account">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </div>

        <!-- ── Pomodoro switch ── -->
        <div class="pom-switch">
            <i class="pom-switch__icon fa-solid fa-fire-flame-curved"></i>
            <span class="pom-switch__label" id="pom-label">POMODORO CHALLENGE</span>
            <label class="pom-switch__toggle" aria-label="Attiva Pomodoro Challenge">
                <input type="checkbox" id="pom-toggle" class="pom-switch__input">
                <span class="pom-switch__slider"></span>
            </label>
        </div>

        <!-- ── Pomodoro config (si rivela allo switch) ── -->
        <div class="pom-config" id="pom-config" aria-hidden="true">
            <div class="pom-config__field">
                <label class="pom-config__label" for="pom-work-min">
                    <i class="fa-solid fa-brain"></i> FOCUS
                </label>
                <div class="pom-config__time">
                    <input type="number" id="pom-work-min" class="pom-config__input" value="25" min="0" max="120" aria-label="Minuti focus">
                    <span class="pom-config__colon">:</span>
                    <input type="number" id="pom-work-sec" class="pom-config__input" value="00" min="0" max="59" aria-label="Secondi focus">
                </div>
                <span class="pom-config__unit">mm:ss</span>
            </div>
            <span class="pom-config__sep"><i class="fa-solid fa-right-left"></i></span>
            <div class="pom-config__field">
                <label class="pom-config__label" for="pom-break-min">
                    <i class="fa-solid fa-mug-hot"></i> BREAK
                </label>
                <div class="pom-config__time">
                    <input type="number" id="pom-break-min" class="pom-config__input" value="5" min="0" max="60" aria-label="Minuti break">
                    <span class="pom-config__colon">:</span>
                    <input type="number" id="pom-break-sec" class="pom-config__input" value="00" min="0" max="59" aria-label="Secondi break">
                </div>
                <span class="pom-config__unit">mm:ss</span>
            </div>
            <span class="pom-config__sep pom-config__sep--full"><i class="fa-solid fa-repeat"></i></span>
            <div class="pom-config__field pom-config__field--cycles">
                <label class="pom-config__label" for="pom-cycles">
                    CICLI
                </label>
                <input type="number" id="pom-cycles" class="pom-config__input pom-config__input--cycles" value="4" min="1" max="99" aria-label="Numero di cicli">
                <button id="pom-infinite" class="pom-config__infinite-btn" type="button" aria-label="Cicli infiniti" aria-pressed="false">
                    <i class="fa-solid fa-infinity"></i>
                </button>
            </div>
        </div>

        <header class="presets" id="presets-header">
            <button class="presets__btn" data-time="300"  data-tooltip="5 minuti">5 MIN</button>
            <button class="presets__btn" data-time="900"  data-tooltip="15 minuti">15 MIN</button>
            <button class="presets__btn" data-time="1800" data-tooltip="30 minuti">30 MIN</button>
            <button class="presets__btn" data-time="3600" data-tooltip="1 ora">1 ORA</button>
        </header>

        <main class="timer">
            <!-- Etichetta fase (solo in modalità pomodoro) -->
            <div class="phase-label" id="phase-label" aria-live="polite"></div>

            <div class="timer__ring">
                <svg class="timer__svg" viewBox="0 0 100 100" aria-hidden="true">
                    <defs>
                        <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#0ff" />
                            <stop offset="100%" stop-color="#f0f" />
                        </linearGradient>
                        <linearGradient id="ringGradientBreak" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#f0f" />
                            <stop offset="100%" stop-color="#a64dff" />
                        </linearGradient>
                    </defs>
                    <circle class="timer__track" id="progress-track" cx="50" cy="50" r="45" />
                    <circle class="timer__progress" cx="50" cy="50" r="45" id="progress-ring" />
                </svg>
                <div id="time-display" class="timer__display" contenteditable="false" spellcheck="false"
                    title="Clicca per modificare">
                    05:00
                </div>
            </div>

            <div class="controls">
                <button id="toggle-btn" class="controls__btn controls__btn--start" data-tooltip="[ SPACE ]">
                    <i class="fa-solid fa-play" id="play-icon"></i>
                    <i class="fa-solid fa-pause" id="pause-icon" style="display:none;"></i>
                    <span id="toggle-text">START</span>
                </button>
                <button id="pause-btn" class="controls__btn controls__btn--pause" data-tooltip="[ P ]" disabled>
                    <i class="fa-solid fa-pause"></i>
                    <span>PAUSA</span>
                </button>
                <button id="reset-btn" class="controls__btn controls__btn--reset" data-tooltip="[ R ]">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span>RESET</span>
                </button>
            </div>

            <!-- Scorciatoie tastiera -->
            <div class="shortcuts">
                <button class="shortcuts__trigger" type="button" aria-label="Mostra scorciatoie tastiera">
                    <i class="fa-solid fa-keyboard"></i>
                    <span>SHORTCUT</span>
                </button>
                <div class="shortcuts__popup" role="tooltip">
                    <p class="shortcuts__title">SCORCIATOIE</p>
                    <ul class="shortcuts__list">
                        <li class="shortcuts__item">
                            <kbd class="shortcuts__key">Space</kbd>
                            <span class="shortcuts__action">Start / Riprendi</span>
                        </li>
                        <li class="shortcuts__item">
                            <kbd class="shortcuts__key">P</kbd>
                            <span class="shortcuts__action">Pausa</span>
                        </li>
                        <li class="shortcuts__item">
                            <kbd class="shortcuts__key">R</kbd>
                            <span class="shortcuts__action">Reset</span>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Raccolta pomodori (visibile solo in modalità pomodoro) -->
            <div class="tomatoes" id="tomatoes" role="region" aria-label="Pomodori completati" aria-hidden="true">
                <span class="tomatoes__label">POMODORI RACCOLTI</span>
                <div class="tomatoes__tray" id="tomatoes-tray"></div>
            </div>
        </main>

        <!-- ── Auth modal ── -->
        <div class="auth-modal" id="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title" hidden>
            <div class="auth-modal__backdrop" id="auth-backdrop"></div>
            <div class="auth-modal__panel">
                <button class="auth-modal__close" id="auth-close-btn" aria-label="Chiudi">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <h2 class="auth-modal__title" id="auth-modal-title">
                    <i class="fa-solid fa-fire-flame-curved"></i> POMODORO TIMER
                </h2>
                <div class="auth-modal__tabs" role="tablist" aria-label="Modalità autenticazione">
                    <button class="auth-modal__tab auth-modal__tab--active" id="tab-login" role="tab"
                        aria-selected="true" aria-controls="panel-login">ACCEDI</button>
                    <button class="auth-modal__tab" id="tab-register" role="tab"
                        aria-selected="false" aria-controls="panel-register">REGISTRATI</button>
                </div>

                <!-- Login -->
                <div class="auth-modal__body" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
                    <div class="auth-modal__field">
                        <label class="auth-modal__label" for="login-email">
                            <i class="fa-solid fa-envelope"></i> EMAIL
                        </label>
                        <input type="email" id="login-email" class="auth-modal__input"
                            autocomplete="email" placeholder="utente@email.com">
                        <span class="auth-modal__field-hint" id="login-email-hint" aria-live="polite"></span>
                    </div>
                    <div class="auth-modal__field">
                        <label class="auth-modal__label" for="login-password">
                            <i class="fa-solid fa-lock"></i> PASSWORD
                        </label>
                        <input type="password" id="login-password" class="auth-modal__input"
                            autocomplete="current-password" placeholder="••••••••">
                        <span class="auth-modal__field-hint" id="login-password-hint" aria-live="polite"></span>
                    </div>
                    <p class="auth-modal__error" id="login-error" aria-live="polite" role="alert"></p>
                    <button class="auth-modal__submit" id="login-submit">
                        <i class="fa-solid fa-right-to-bracket"></i> ACCEDI
                    </button>
                </div>

                <!-- Registrazione -->
                <div class="auth-modal__body" id="panel-register" role="tabpanel" aria-labelledby="tab-register" hidden>
                    <div class="auth-modal__field">
                        <label class="auth-modal__label" for="reg-email">
                            <i class="fa-solid fa-envelope"></i> EMAIL
                        </label>
                        <input type="email" id="reg-email" class="auth-modal__input"
                            autocomplete="email" placeholder="utente@email.com">
                        <span class="auth-modal__field-hint" id="reg-email-hint" aria-live="polite"></span>
                    </div>
                    <div class="auth-modal__field">
                        <label class="auth-modal__label" for="reg-password">
                            <i class="fa-solid fa-lock"></i> PASSWORD
                        </label>
                        <input type="password" id="reg-password" class="auth-modal__input"
                            autocomplete="new-password" placeholder="min 6 caratteri">
                        <div class="auth-modal__strength" id="reg-strength" aria-hidden="true">
                            <div class="auth-modal__strength-bar" id="reg-strength-bar"></div>
                        </div>
                        <span class="auth-modal__field-hint" id="reg-password-hint" aria-live="polite"></span>
                    </div>
                    <p class="auth-modal__error" id="reg-error" aria-live="polite" role="alert"></p>
                    <button class="auth-modal__submit" id="reg-submit">
                        <i class="fa-solid fa-user-plus"></i> CREA ACCOUNT
                    </button>
                </div>
            </div>
        </div>

        <div class="toast" id="toast">
            <i class="fa-solid fa-bell"></i>
            <span>Timer Completato!</span>
        </div>

        <!-- ── Auth snack notification ── -->
        <div class="auth-snack" id="auth-snack" aria-live="polite">
            <i class="auth-snack__icon fa-solid fa-circle-check" id="auth-snack-icon"></i>
            <span id="auth-snack-text"></span>
        </div>
    </div>

    <script src="script.js"></script>
    <script type="module" src="auth.js"></script>
</body>

</html>
